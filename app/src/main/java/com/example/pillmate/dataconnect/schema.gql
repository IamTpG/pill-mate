scalar Date
scalar Timestamp

# ==========================================
# 1. ENUMS
# ==========================================
enum AccountType { CAREGIVER USER }
enum ScheduleType { MEDICATION APPOINTMENT MEAL EXERCISE TASK }
enum LogStatus { COMPLETED MISSED SKIPPED LATE }
enum ReminderType { PUSH EMAIL SMS }
enum InventoryReason { TAKEN REFILL ADJUSTMENT }
enum ExerciseCategory { STRENGTH CARDIO FLEXIBILITY DURABILITY }
enum HealthMetricType { WEIGHT BLOOD_PRESSURE HEART_RATE GLUCOSE TEMPERATURE }
enum MedicalRecordType { PRESCRIPTION TEST_RESULT INSURANCE SCAN }
enum ChatRole { USER ASSISTANT SYSTEM }

# ==========================================
# 3. IDENTITY & PROFILES
# ==========================================
type Account @table {
    email: String! @unique
    passwordHash: String!
    authProvider: String
    type: AccountType!
    createdAt: Timestamp
    updatedAt: Timestamp
    deletedAt: Timestamp
}

type Profile @table {
    # FDC sẽ tự map trường này thành cột accountId trong SQL
    account: Account!
    fullName: String!
    birthday: Date
    height: Float
    weight: Float
    medicalConditions: String
    createdAt: Timestamp
    updatedAt: Timestamp
    deletedAt: Timestamp
}

type CaregiverLink @table {
    caregiverAccount: Account
    patientProfile: Profile
    permission: String
    createdAt: Timestamp
    updatedAt: Timestamp
    deletedAt: Timestamp
}

# ==========================================
# 4. CATALOGS & DEFINITIONS
# ==========================================
type MedicationCatalog @table {
    name: String!
    description: String
    unit: String
    commonDosages: String
    photo: String
}

type Medication @table {
    profile: Profile
    name: String
    description: String
    unit: String
    commonDosages: String
    photo: String
    createdAt: Timestamp
    updatedAt: Timestamp
    deletedAt: Timestamp
}

type MedicationSupply @table {
    medication: Medication!
    quantity: Float!
    expirationDate: Date
    createdAt: Timestamp
    updatedAt: Timestamp
    deletedAt: Timestamp
}

type Appointment @table {
    profile: Profile!
    name: String!
    location: String
    doctorName: String
    category: String
    description: String
    createdAt: Timestamp
    updatedAt: Timestamp
    deletedAt: Timestamp
}

type Meal @table {
    profile: Profile!
    name: String!
    description: String
    createdAt: Timestamp
    updatedAt: Timestamp
    deletedAt: Timestamp
}

type ExerciseCatalog @table {
    name: String!
    category: ExerciseCategory
    muscleGroup: String
    equipment: String
    description: String
    unit: String
}

type Exercise @table {
    profile: Profile!
    name: String
    category: ExerciseCategory
    muscleGroup: String
    equipment: String
    description: String
    unit: String
    createdAt: Timestamp
    updatedAt: Timestamp
    deletedAt: Timestamp
}

type Task @table {
    profile: Profile!
    name: String!
    description: String
    createdAt: Timestamp
    updatedAt: Timestamp
    deletedAt: Timestamp
}

# ==========================================
# 5. EVENT BRIDGES
# ==========================================
type MedicationEvent @table {
    profile: Profile
    medication: Medication
    catalog: MedicationCatalog
    dose: Float!
    notes: String
    createdAt: Timestamp
    updatedAt: Timestamp
    deletedAt: Timestamp
}

type AppointmentEvent @table {
    profile: Profile
    appointment: Appointment
    doctorName: String
    location: String
    notes: String
    timestamp: Timestamp!
    createdAt: Timestamp
    updatedAt: Timestamp
    deletedAt: Timestamp
}

type MealEvent @table {
    profile: Profile
    meal: Meal
    calories: Int
    notes: String
    createdAt: Timestamp
    updatedAt: Timestamp
    deletedAt: Timestamp
}

type ExerciseEvent @table {
    profile: Profile
    exercise: Exercise
    catalog: ExerciseCatalog
    durationMinutes: Int
    sets: Int
    reps: Int
    distance: Float
    notes: String
    createdAt: Timestamp
    updatedAt: Timestamp
    deletedAt: Timestamp
}

type TaskEvent @table {
    profile: Profile
    task: Task
    notes: String
    createdAt: Timestamp
    updatedAt: Timestamp
    deletedAt: Timestamp
}

# ==========================================
# 6. POLYMORPHIC SCHEDULING & LOGGING
# ==========================================
type Schedule @table {
    profile: Profile
    type: ScheduleType!
    eventId: Int! # Giữ nguyên Int vì đây là ID đa hình (chỉ đến nhiều bảng event khác nhau)
    startTime: String! # GraphQL không có kiểu Time, dùng String để chứa "HH:MM:SS"
    endTime: String
    recurrenceRule: String
    enabled: Boolean
    createdAt: Timestamp
    updatedAt: Timestamp
    deletedAt: Timestamp
}

type ScheduleReminder @table {
    schedule: Schedule!
    minutesBefore: Int!
    type: ReminderType!
    createdAt: Timestamp
}

type Log @table {
    profile: Profile
    type: ScheduleType!
    eventId: Int!
    timestamp: Timestamp
    actualTime: Timestamp
    status: LogStatus
    notes: String
    createdAt: Timestamp
    updatedAt: Timestamp
    deletedAt: Timestamp
}

type MedicationInventoryLog @table {
    medicationSupply: MedicationSupply!
    changeAmount: Float!
    reason: InventoryReason!
    createdAt: Timestamp
}

# ==========================================
# 7. HEALTH & MESSAGING
# ==========================================
type HealthMetric @table {
    profile: Profile!
    type: HealthMetricType!
    valuePrimary: Float!
    valueSecondary: Float
    unit: String
    recordedAt: Timestamp
}

type Conversation @table {
    profile: Profile!
    createdAt: Timestamp
}

type Message @table {
    conversation: Conversation!
    role: ChatRole!
    content: String!
    createdAt: Timestamp
}